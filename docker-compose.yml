services:

  # ── Postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agora-postgres
    restart: unless-stopped
    user: "500:500"
    environment:
      POSTGRES_DB:       agora
      POSTGRES_USER:     agora
      POSTGRES_PASSWORD: agora
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - agora
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agora"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agora-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    networks:
      - agora
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Go API backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agora-backend
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - HTTP_ADDR=:8080
      - DATABASE_URL=postgres://agora:agora@postgres:5432/agora?sslmode=disable
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data/uploads:/data/uploads
    networks:
      - agora
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── React frontend (built, served by its own nginx) ───────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: agora-frontend
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./data/uploads:/data/uploads:ro
    networks:
      - agora
    depends_on:
      - backend

  # ── Reverse proxy (HTTP or HTTPS depending on SSL_ENABLED in .env) ────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.nginx
    container_name: agora-nginx
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
      - ./data/uploads:/data/uploads:ro
    networks:
      - agora
    depends_on:
      - frontend

  # ── Certbot auto-renewal (only active when SSL_ENABLED=true) ──────────────
  certbot:
    image: certbot/certbot
    container_name: agora-certbot
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    # Renew twice daily; only acts within 30 days of expiry
    entrypoint: >
      /bin/sh -c "
        if [ '$$SSL_ENABLED' = 'true' ]; then
          trap exit TERM;
          while :; do
            certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
            sleep 12h & wait $${!};
          done
        else
          echo 'SSL_ENABLED is not true — certbot sleeping indefinitely';
          sleep infinity
        fi
      "
    env_file:
      - .env
    networks:
      - agora

networks:
  agora:
    driver: bridge
