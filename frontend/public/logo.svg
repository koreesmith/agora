<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- App icon background -->
  <rect width="1024" height="1024" rx="224" fill="#486581"/>
  
  <!-- Subtle inner glow -->
  <rect width="1024" height="1024" rx="224" fill="url(#iconGlow)" opacity="0.4"/>

  <!-- A left leg -->
  <path d="M512 168L228 768" stroke="white" stroke-width="72" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- A right leg -->
  <path d="M512 168L796 768" stroke="white" stroke-width="72" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Crossbar center segment -->
  <line x1="368" y1="536" x2="656" y2="536" stroke="white" stroke-width="64" stroke-linecap="round"/>

  <!-- Left radiating dot — close -->
  <circle cx="296" cy="536" r="38" fill="#9fb3c8"/>
  <!-- Right radiating dot — close -->
  <circle cx="728" cy="536" r="38" fill="#9fb3c8"/>
  <!-- Left radiating dot — far -->
  <circle cx="216" cy="536" r="26" fill="#9fb3c8" opacity="0.55"/>
  <!-- Right radiating dot — far -->
  <circle cx="808" cy="536" r="26" fill="#9fb3c8" opacity="0.55"/>

  <defs>
    <radialGradient id="iconGlow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6b8fa8"/>
      <stop offset="100%" stop-color="#2c4a62"/>
    </radialGradient>
  </defs>
</svg>